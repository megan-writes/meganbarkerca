<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Subtle grid texture -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <!-- Gradient line -->
    <linearGradient id="grad-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="60%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <!-- Blue glow -->
    <radialGradient id="blue-glow" cx="0%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber glow -->
    <radialGradient id="amber-glow" cx="100%" cy="0%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#blue-glow)"/>
  <rect width="1200" height="630" fill="url(#amber-glow)"/>

  <!-- Gradient line at top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#grad-line)" opacity="0.6"/>

  <!-- Logo mark: blue square + wordmark -->
  <rect x="80" y="72" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="104" y="84" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="500" fill="#ffffff" letter-spacing="0.5">megan barker</text>

  <!-- Main heading -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">Security engineer.</text>
  <text x="80" y="372" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">Technical writer.</text>

  <!-- Tagline -->
  <text x="80" y="454" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#94a3b8">Most security engineers can't write. Most technical writers can't build.</text>
  <text x="80" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#94a3b8">I do both.</text>

  <!-- URL -->
  <text x="80" y="574" font-family="'Courier New', Courier, monospace" font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="0.5">meganbarker.ca</text>
</svg>
